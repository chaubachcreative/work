<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — [TEAM_NAME]</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<script type="module" src="/src/main.tsx"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #FFFFFF; --cream-deep: #F0F0F0; --terra: #000000;
  --charcoal: #000000; --stone: #555555; --white: #FFFFFF;
  --green: #3A7A5A; --green-bg: #EBF4EF;
  --serif: 'DM Serif Display', Georgia, serif;
  --sans: 'Inter', -apple-system, sans-serif;
}
html { scroll-behavior: smooth; }
body { background: var(--cream); color: var(--charcoal); font-family: var(--sans); font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; overflow-x: hidden; }
img, video, svg { max-width: 100%; }
button, input, textarea, select { font: inherit; }
.card { background: var(--white); border: 1px solid rgba(0,0,0,0.08); border-radius: 12px; padding: 24px 28px; min-width: 0; }
.section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--stone); margin-bottom: 14px; display: block; }
.pill { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; display: inline-block; }

@media (max-width: 768px) {
  html,
  body,
  #root,
  #root > div {
    width: 100% !important;
    max-width: 100% !important;
    overflow-x: hidden !important;
  }

  #root * {
    min-width: 0 !important;
  }

  #root h1,
  #root h2,
  #root p,
  #root span,
  #root a,
  #root button {
    overflow-wrap: anywhere !important;
  }

  #root > div > nav {
    height: auto !important;
    min-height: 56px !important;
    padding: 10px 16px !important;
    gap: 12px !important;
    align-items: center !important;
  }

  #root > div > nav span {
    font-size: 16px !important;
    line-height: 1.25 !important;
  }

  #root > div > main {
    max-width: none !important;
    padding: 84px 0 48px !important;
    width: calc(100% - 32px) !important;
    margin-left: 16px !important;
    margin-right: 16px !important;
  }

  #root > div[style*="min-height: 100vh"] > div {
    width: calc(100% - 32px) !important;
    max-width: 360px !important;
  }

  input,
  button {
    max-width: 100% !important;
  }

  #root > div > main > div:first-child {
    grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
    gap: 10px !important;
    margin-bottom: 28px !important;
  }

  #root > div > main > div:nth-child(2) {
    grid-template-columns: 1fr !important;
    gap: 18px !important;
  }

  .card {
    padding: 20px 16px !important;
    border-radius: 10px !important;
  }

  .card [style*="justify-content: space-between"] {
    flex-wrap: wrap !important;
    align-items: flex-start !important;
  }

  .card [style*="white-space: pre-wrap"],
  .card p,
  .card span,
  button p {
    overflow-wrap: anywhere !important;
  }

  button {
    min-height: 40px;
  }
}

@media (max-width: 480px) {
  #root > div > nav {
    align-items: flex-start !important;
  }

  #root > div > main {
    padding-top: 88px !important;
  }

  #root > div > main > div:first-child {
    grid-template-columns: 1fr !important;
  }

  .card [style*="align-items: center"] {
    align-items: flex-start !important;
  }

  .pill {
    max-width: 100%;
    white-space: normal;
  }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect } = React;

const ADMIN_PASSWORD = "Ducanh2003@";

const DELIVERABLES_BY_PKG = {
  starter: ["Positioning statement + bio rewrite", "Link-in-bio rebuild with waitlist form", "3 short-form edits", "Captions, hook bank & hashtag pack"],
  foundation: ["3-page brand mini-guide", "4 content pillars documented", "8 short-form edits + 4 feed posts", "Waitlist + welcome email setup", "Wrap report"],
  momentum: ["Full 8-page brand mini-kit", "4 content pillars + 90-day calendar", "12 edits + 9 posts + 6 newsletters", "Waitlist + welcome email flow", "Privates booking flow", "Wrap report w/ revenue attribution", "Monthly strategy calls"]
};

function getAllBookings() {
  return JSON.parse(localStorage.getItem("tn_bookings") || "{}");
}

function saveAllBookings(all) {
  localStorage.setItem("tn_bookings", JSON.stringify(all));
}

// ─── LOGIN ───────────────────────────────────────────────────────────────────

function Login({ onLogin }) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState(false);
  const submit = (e) => {
    e.preventDefault();
    if (pw === ADMIN_PASSWORD) {onLogin();} else
    {setErr(true);setTimeout(() => setErr(false), 1500);}
  };
  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: "0 24px" }}>
      <div style={{ width: "100%", maxWidth: 360 }}>
        <p style={{ fontFamily: "var(--serif)", fontSize: 28, marginBottom: 8 }}>Admin login</p>
        <p style={{ fontSize: 13, color: "var(--stone)", marginBottom: 28 }}>This page is for admin only.</p>
        <form onSubmit={submit} style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <input
            type="password" value={pw} onChange={(e) => setPw(e.target.value)}
            placeholder="Password"
            style={{ fontFamily: "var(--sans)", fontSize: 15, padding: "12px 14px", borderRadius: 8, border: err ? "1.5px solid var(--terra)" : "1px solid rgba(0,0,0,0.18)", background: "var(--white)", color: "var(--charcoal)", outline: "none" }} />
          
          {err && <p style={{ fontSize: 13, color: "var(--terra)" }}>Incorrect password.</p>}
          <button type="submit" style={{ background: "var(--terra)", color: "var(--cream)", border: "none", borderRadius: 8, padding: "13px", fontFamily: "var(--sans)", fontSize: 14, fontWeight: 500, cursor: "pointer" }}>
            Sign in
          </button>
        </form>
      </div>
    </div>);

}

// ─── MAIN APP ────────────────────────────────────────────────────────────────

function App() {
  const [authed, setAuthed] = useState(() => sessionStorage.getItem("tn_admin") === "1");
  const [bookings, setBookings] = useState({});
  const [selected, setSelected] = useState(null);

  useEffect(() => {
    if (authed) setBookings(getAllBookings());
  }, [authed]);

  const login = () => {sessionStorage.setItem("tn_admin", "1");setAuthed(true);setBookings(getAllBookings());};

  const updateBooking = (id, changes) => {
    const all = getAllBookings();
    all[id] = { ...all[id], ...changes };
    saveAllBookings(all);
    setBookings({ ...all });
    if (selected?.id === id) setSelected({ ...all[id], id });
  };

  if (!authed) return <Login onLogin={login} />;

  const list = Object.entries(bookings).map(([id, b]) => ({ ...b, id })).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  return (
    <div style={{ minHeight: "100vh" }}>
      <nav style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 100, padding: "0 max(24px,4vw)", height: 60, display: "flex", alignItems: "center", justifyContent: "space-between", background: "rgba(255,255,255,0.95)", backdropFilter: "blur(12px)", borderBottom: "1px solid rgba(0,0,0,0.08)" }}>
        <span style={{ fontFamily: "var(--serif)", fontSize: 17 }}>[TEAM_NAME] Admin</span>
        <button onClick={() => {sessionStorage.removeItem("tn_admin");setAuthed(false);}} style={{ background: "none", border: "none", fontSize: 13, color: "var(--stone)", cursor: "pointer", fontFamily: "var(--sans)" }}>Sign out</button>
      </nav>

      <main style={{ maxWidth: 1060, margin: "0 auto", padding: "80px max(24px,4vw) 80px" }}>
        {/* Stats */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(140px,1fr))", gap: 12, marginBottom: 32 }}>
          {[
          { label: "Total clients", value: list.length },
          { label: "Active packages", value: list.filter((b) => b.status !== "completed").length },
          { label: "Revenue", value: "$" + list.reduce((a, b) => a + (b.price || 0), 0).toLocaleString() },
          { label: "Collected", value: "$" + list.reduce((a, b) => a + (b.schedule || []).filter((s) => s.paid).reduce((x, s) => x + s.amount, 0), 0).toLocaleString() }].
          map((s, i) =>
          <div key={i} className="card" style={{ padding: "16px 20px" }}>
              <p style={{ fontSize: 11, fontWeight: 500, letterSpacing: "0.06em", textTransform: "uppercase", color: "var(--stone)", marginBottom: 5 }}>{s.label}</p>
              <p style={{ fontFamily: "var(--serif)", fontSize: 22 }}>{s.value}</p>
            </div>
          )}
        </div>

        <div style={{ display: "grid", gridTemplateColumns: selected ? "320px 1fr" : "1fr", gap: 20, alignItems: "start" }}>
          {/* Client list */}
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <span className="section-label">Clients</span>
            {list.length === 0 && <p style={{ fontSize: 13, color: "var(--stone)", fontStyle: "italic" }}>No bookings yet. They\u2019ll appear here after checkout.</p>}
            {list.map((b) => {
              const paidCount = (b.schedule || []).filter((s) => s.paid).length;
              const totalPay = (b.schedule || []).length;
              const allPaid = paidCount === totalPay && totalPay > 0;
              return (
                <button key={b.id} onClick={() => setSelected(selected?.id === b.id ? null : b)} style={{
                  background: selected?.id === b.id ? "var(--charcoal)" : "var(--white)",
                  border: selected?.id === b.id ? "none" : "1px solid rgba(0,0,0,0.08)",
                  borderRadius: 10, padding: "16px 18px", cursor: "pointer", textAlign: "left",
                  transition: "all 0.15s"
                }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                    <div>
                      <p style={{ fontSize: 14, fontWeight: 500, color: selected?.id === b.id ? "var(--cream)" : "var(--charcoal)", marginBottom: 3 }}>{b.name}</p>
                      <p style={{ fontSize: 12, color: selected?.id === b.id ? "rgba(255,255,255,0.6)" : "var(--stone)" }}>{b.packageName} &middot; {b.instagram}</p>
                    </div>
                    <span className="pill" style={{ background: allPaid ? "var(--green-bg)" : "var(--cream-deep)", color: allPaid ? "var(--green)" : "var(--stone)", flexShrink: 0 }}>
                      {paidCount}/{totalPay} paid
                    </span>
                  </div>
                </button>);

            })}
          </div>

          {/* Detail panel */}
          {selected && <ClientDetail booking={selected} updateBooking={updateBooking} />}
        </div>
      </main>
    </div>);

}

// ─── CLIENT DETAIL ────────────────────────────────────────────────────────────

function ClientDetail({ booking, updateBooking }) {
  const togglePayment = (i) => {
    const schedule = booking.schedule.map((s, idx) => idx === i ? { ...s, paid: !s.paid, paidOn: !s.paid ? new Date().toISOString() : null } : s);
    updateBooking(booking.id, { schedule });
  };

  const toggleDeliverable = (item) => {
    const status = { ...(booking.deliverableStatus || {}) };
    status[item] = !status[item];
    updateBooking(booking.id, { deliverableStatus: status });
  };

  const deliverables = DELIVERABLES_BY_PKG[booking.package] || [];
  const dStatus = booking.deliverableStatus || {};
  const portalUrl = `client_portal.html?booking=${booking.id}`;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      {/* Header */}
      <div className="card">
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12, marginBottom: 16 }}>
          <div>
            <h2 style={{ fontFamily: "var(--serif)", fontSize: 24, marginBottom: 4 }}>{booking.name}</h2>
            <p style={{ fontSize: 13, color: "var(--stone)" }}>{booking.email} &middot; {booking.phone || "No phone"} &middot; {booking.instagram}</p>
          </div>
          <span className="pill" style={{ background: "var(--cream-deep)", color: "var(--stone)", fontSize: 12 }}>
            {booking.packageName} &middot; ${(booking.price || 0).toLocaleString()}
          </span>
        </div>
        <div style={{ background: "var(--cream-deep)", borderRadius: 8, padding: "14px 16px", marginBottom: 14 }}>
          <p style={{ fontSize: 11, fontWeight: 500, letterSpacing: "0.06em", textTransform: "uppercase", color: "var(--stone)", marginBottom: 6 }}>Their goals</p>
          <p style={{ fontSize: 13, color: "var(--charcoal)", lineHeight: 1.65, whiteSpace: "pre-wrap" }}>{booking.goals || "—"}</p>
        </div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <a href={`mailto:${booking.email}`} style={{ fontSize: 13, fontWeight: 500, color: "var(--terra)", textDecoration: "none", borderBottom: "1px solid var(--terra)", paddingBottom: 1 }}>
            Email client
          </a>
          <span style={{ color: "var(--stone)" }}>&middot;</span>
          <a href={portalUrl} target="_blank" style={{ fontSize: 13, color: "var(--stone)", textDecoration: "none", borderBottom: "1px solid rgba(85,85,85,0.35)", paddingBottom: 1 }}>
            Open their portal &rarr;
          </a>
          <span style={{ color: "var(--stone)" }}>&middot;</span>
          <button onClick={() => {navigator.clipboard.writeText(window.location.origin + "/" + portalUrl);}} style={{ background: "none", border: "none", fontSize: 13, color: "var(--stone)", cursor: "pointer", fontFamily: "var(--sans)", textDecoration: "underline", padding: 0 }}>
            Copy portal link
          </button>
        </div>
      </div>

      {/* Payments */}
      <div className="card">
        <span className="section-label">Payments — mark as received</span>
        <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
          {(booking.schedule || []).map((s, i) =>
          <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 0", borderBottom: i < booking.schedule.length - 1 ? "1px solid rgba(0,0,0,0.07)" : "none", gap: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <button onClick={() => togglePayment(i)} style={{
                width: 22, height: 22, borderRadius: 4, border: "none", cursor: "pointer",
                background: s.paid ? "var(--green)" : "rgba(0,0,0,0.12)",
                display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0
              }}>
                  {s.paid && <svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>}
                </button>
                <div>
                  <p style={{ fontSize: 14, color: "var(--charcoal)" }}>{s.label}</p>
                  {s.paidOn && <p style={{ fontSize: 11, color: "var(--stone)" }}>Received {new Date(s.paidOn).toLocaleDateString("en-CA", { month: "short", day: "numeric" })}</p>}
                </div>
              </div>
              <span style={{ fontFamily: "var(--serif)", fontSize: 18, color: s.paid ? "var(--green)" : "var(--charcoal)" }}>${s.amount.toLocaleString()}</span>
            </div>
          )}
        </div>
      </div>

      {/* Deliverables */}
      <div className="card">
        <span className="section-label">Deliverables — mark as handed off</span>
        <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
          {deliverables.map((item, i) => {
            const done = !!dStatus[item];
            return (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "11px 0", borderBottom: i < deliverables.length - 1 ? "1px solid rgba(0,0,0,0.07)" : "none" }}>
                <button onClick={() => toggleDeliverable(item)} style={{
                  width: 20, height: 20, borderRadius: 4, border: "none", cursor: "pointer",
                  background: done ? "var(--terra)" : "rgba(0,0,0,0.1)",
                  display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0
                }}>
                  {done && <svg width="10" height="8" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>}
                </button>
                <span style={{ fontSize: 14, color: done ? "var(--stone)" : "var(--charcoal)", textDecoration: done ? "line-through" : "none" }}>{item}</span>
              </div>);

          })}
        </div>
      </div>

      {/* Notes from client */}
      {(booking.notes || []).length > 0 &&
      <div className="card">
          <span className="section-label">Notes from client</span>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {booking.notes.map((note, i) =>
          <div key={i} style={{ background: "var(--cream-deep)", borderRadius: 8, padding: "12px 14px" }}>
                <p style={{ fontSize: 13, color: "var(--charcoal)", lineHeight: 1.6, whiteSpace: "pre-wrap" }}>{note.text}</p>
                <p style={{ fontSize: 11, color: "var(--stone)", marginTop: 6 }}>{new Date(note.createdAt).toLocaleDateString("en-CA", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })}</p>
              </div>
          )}
          </div>
        </div>
      }

      {/* Referral + booked */}
      <div className="card" style={{ background: "var(--cream-deep)", border: "none", padding: "16px 20px" }}>
        <p style={{ fontSize: 13, color: "var(--stone)" }}>
          <strong style={{ color: "var(--charcoal)", fontWeight: 500 }}>Referral:</strong> {booking.referral || "Not specified"}<br />
          <strong style={{ color: "var(--charcoal)", fontWeight: 500 }}>Booked:</strong> {new Date(booking.createdAt).toLocaleDateString("en-CA", { month: "long", day: "numeric", year: "numeric" })}<br />
          <strong style={{ color: "var(--charcoal)", fontWeight: 500 }}>Payment method:</strong> {booking.paymentMethod === "etransfer" ? "E-Transfer" : "PayPal"}
        </p>
      </div>
    </div>);

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
