<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Portal — [TEAM_NAME]</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<script type="module" src="/src/main.tsx"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #FFFFFF; --cream-deep: #F0F0F0; --terra: #000000;
  --charcoal: #000000; --stone: #555555; --white: #FFFFFF;
  --green: #3A7A5A; --green-bg: #EBF4EF;
  --serif: 'DM Serif Display', Georgia, serif;
  --sans: 'Inter', -apple-system, sans-serif;
}
html { scroll-behavior: smooth; }
body { background: var(--cream); color: var(--charcoal); font-family: var(--sans); font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; overflow-x: hidden; }
img, video, svg { max-width: 100%; }
button, input, textarea, select { font: inherit; }
.tab-btn { background: none; border: none; cursor: pointer; font-family: var(--sans); font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: 20px; transition: all 0.15s; color: var(--stone); }
.tab-btn.active { background: var(--charcoal); color: var(--cream); }
.card { background: var(--white); border: 1px solid rgba(0,0,0,0.08); border-radius: 12px; padding: 24px 28px; min-width: 0; }
.section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--stone); margin-bottom: 16px; display: block; }
input[type="file"] { display: none; }

@media (max-width: 768px) {
  html,
  body,
  #root,
  #root > div {
    width: 100% !important;
    max-width: 100% !important;
    overflow-x: hidden !important;
  }

  #root * {
    min-width: 0 !important;
  }

  #root h1,
  #root h2,
  #root p,
  #root span,
  #root a,
  #root button {
    overflow-wrap: anywhere !important;
  }

  #root > div > nav {
    height: auto !important;
    min-height: 56px !important;
    padding: 10px 16px !important;
    gap: 6px 12px !important;
    align-items: flex-start !important;
  }

  #root > div > nav span:first-child {
    font-size: 16px !important;
    line-height: 1.25 !important;
  }

  #root > div > nav span:last-child {
    max-width: 58vw !important;
    font-size: 12px !important;
    line-height: 1.35 !important;
    text-align: right !important;
    overflow-wrap: anywhere !important;
  }

  #root > div > main {
    max-width: none !important;
    padding: 84px 0 48px !important;
    width: calc(100% - 32px) !important;
    margin-left: 16px !important;
    margin-right: 16px !important;
  }

  #root > div[style*="height: 100vh"] {
    padding-left: 16px !important;
    padding-right: 16px !important;
  }

  #root h1 {
    font-size: clamp(30px, 10vw, 42px) !important;
  }

  .card {
    padding: 20px 16px !important;
    border-radius: 10px !important;
  }

  .card [style*="justify-content: space-between"] {
    flex-wrap: wrap !important;
    align-items: flex-start !important;
  }

  .card [style*="white-space: pre-wrap"],
  .card p,
  .card span {
    overflow-wrap: anywhere !important;
  }

  #root > div > main > div:nth-of-type(2) {
    width: 100% !important;
    max-width: 100% !important;
    border-radius: 14px !important;
    overflow-x: auto !important;
    -webkit-overflow-scrolling: touch;
    flex-wrap: nowrap !important;
  }

  .tab-btn {
    flex: 0 0 auto;
    min-height: 40px;
    padding: 9px 14px;
  }

  textarea,
  input {
    max-width: 100% !important;
  }

  a[href^="mailto:"],
  button {
    min-height: 40px;
  }
}

@media (max-width: 480px) {
  #root > div > main {
    padding-top: 92px !important;
  }

  #root > div > main > div:first-child {
    margin-bottom: 24px !important;
  }

  .card [style*="align-items: center"] {
    align-items: flex-start !important;
  }

  .card a[href^="mailto:"] {
    width: 100% !important;
    text-align: center !important;
  }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const DELIVERABLES_BY_PKG = {
  starter: [
    "Positioning statement + bio rewrite",
    "Link-in-bio rebuild with waitlist form",
    "3 short-form edits",
    "Captions, hook bank & hashtag pack",
  ],
  foundation: [
    "3-page brand mini-guide",
    "4 content pillars documented",
    "8 short-form edits + 4 feed posts",
    "Waitlist + welcome email setup",
    "Wrap report",
  ],
  momentum: [
    "Full 8-page brand mini-kit",
    "4 content pillars + 90-day calendar",
    "12 edits + 9 posts + 6 newsletters",
    "Waitlist + welcome email flow",
    "Privates booking flow",
    "Wrap report w/ revenue attribution",
    "Monthly strategy calls",
  ],
};

const NEXT_STEPS_BY_PKG = {
  starter: [
    { title: "Kickoff call (30 min)", desc: "We\u2019ll send a calendar invite within 24 hours. Bring anything you\u2019ve been thinking about \u2014 examples you love, frustrations, questions." },
    { title: "Shared folder", desc: "You\u2019ll get a link where everything lives \u2014 briefs, drafts, final deliverables, brand assets as we build them." },
    { title: "Prep questions", desc: "A short list of things to think through before our first call. Nothing intense \u2014 just enough to make the kickoff productive." },
  ],
  foundation: [
    { title: "Kickoff call (45 min)", desc: "We\u2019ll send a calendar invite within 24 hours. Bring examples you love, things that have frustrated you, and any questions about the process." },
    { title: "Shared folder", desc: "You\u2019ll get a link where everything lives \u2014 briefs, drafts, final deliverables, brand assets as we build them." },
    { title: "Prep questions", desc: "A short list of things to think through before our first call. Nothing intense \u2014 just enough to make the kickoff productive." },
    { title: "Brand direction review", desc: "After the kickoff we\u2019ll share 2\u20133 brand directions for you to react to before we build anything." },
  ],
  momentum: [
    { title: "Kickoff call (60 min)", desc: "We\u2019ll send a calendar invite within 24 hours. This is where we go deep on your audience, goals, and what you want the work to actually do for you." },
    { title: "Shared folder", desc: "You\u2019ll get a link where everything lives \u2014 briefs, drafts, deliverables, brand assets, and your content calendar as we build." },
    { title: "Prep questions", desc: "A short list to think through before our call. Just enough to make our first session productive instead of introductory." },
    { title: "Brand direction review", desc: "After the kickoff we\u2019ll share 2\u20133 brand directions for your reaction before we build anything." },
    { title: "Content calendar review", desc: "Week 2: we\u2019ll share a draft 90-day calendar for your input before we lock it in." },
  ],
};

function getBooking() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get("booking");
  if (!id) return null;
  // Try localStorage first
  try {
    const all = JSON.parse(localStorage.getItem("tn_bookings") || "{}");
    if (all[id]) return { ...all[id], id };
  } catch(e) {}
  // Fall back to URL-encoded data
  const d = params.get("d");
  if (d) {
    try {
      const booking = JSON.parse(atob(decodeURIComponent(d)));
      // Save it for future visits
      try { saveBooking(booking); } catch(e) {}
      return booking;
    } catch(e) {}
  }
  return null;
}

function saveBooking(booking) {
  const all = JSON.parse(localStorage.getItem("tn_bookings") || "{}");
  all[booking.id] = booking;
  localStorage.setItem("tn_bookings", JSON.stringify(all));
}

// ─── TABS ─────────────────────────────────────────────────────────────────────

const TABS = ["Overview", "Deliverables", "Payments", "Files", "Notes"];

function App() {
  const [booking, setBooking] = useState(null);
  const [tab, setTab] = useState("Overview");
  const [notFound, setNotFound] = useState(false);

  useEffect(() => {
    const b = getBooking();
    if (b) {
      // Initialise deliverables if missing
      if (!b.deliverableStatus) {
        const items = DELIVERABLES_BY_PKG[b.package] || [];
        b.deliverableStatus = Object.fromEntries(items.map(d => [d, false]));
      }
      if (!b.notes) b.notes = [];
      if (!b.files) b.files = [];
      setBooking(b);
    } else {
      setNotFound(true);
    }
  }, []);

  const update = (changes) => {
    const updated = { ...booking, ...changes };
    setBooking(updated);
    saveBooking(updated);
  };

  if (notFound) return <NotFound />;
  if (!booking) return <Loading />;

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav name={booking.name} pkg={booking.packageName} />
      <main style={{ maxWidth: 860, margin: "0 auto", padding: "84px max(24px,4vw) 80px" }}>
        {/* Header */}
        <div style={{ marginBottom: 32 }}>
          <p style={{ fontSize: 11, fontWeight: 500, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--stone)", marginBottom: 8 }}>
            Your portal
          </p>
          <h1 style={{ fontFamily: "var(--serif)", fontSize: "clamp(28px,4vw,44px)", lineHeight: 1.1, letterSpacing: "-0.02em", marginBottom: 6 }}>
            Hey, {booking.name.split(" ")[0]}. 👋
          </h1>
          <p style={{ fontSize: 14, color: "var(--stone)" }}>
            {booking.packageName} package &mdash; booked {new Date(booking.createdAt).toLocaleDateString("en-CA", { month: "long", day: "numeric", year: "numeric" })}
          </p>
        </div>

        {/* Tab bar */}
        <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 32, background: "var(--cream-deep)", padding: 4, borderRadius: 24, width: "fit-content" }}>
          {TABS.map(t => (
            <button key={t} className={`tab-btn ${tab === t ? "active" : ""}`} onClick={() => setTab(t)}>{t}</button>
          ))}
        </div>

        {/* Tab content */}
        {tab === "Overview" && <OverviewTab booking={booking} />}
        {tab === "Deliverables" && <DeliverablesTab booking={booking} update={update} />}
        {tab === "Payments" && <PaymentsTab booking={booking} />}
        {tab === "Files" && <FilesTab booking={booking} update={update} />}
        {tab === "Notes" && <NotesTab booking={booking} update={update} />}
      </main>
    </div>
  );
}

// ─── OVERVIEW ────────────────────────────────────────────────────────────────

function OverviewTab({ booking }) {
  const steps = NEXT_STEPS_BY_PKG[booking.package] || [];
  const doneCount = Object.values(booking.deliverableStatus || {}).filter(Boolean).length;
  const totalCount = (DELIVERABLES_BY_PKG[booking.package] || []).length;
  const paidCount = (booking.schedule || []).filter(s => s.paid).length;
  const totalPayments = (booking.schedule || []).length;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      {/* Stats row */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px,1fr))", gap: 12 }}>
        {[
          { label: "Package", value: booking.packageName },
          { label: "Duration", value: booking.duration },
          { label: "Deliverables", value: `${doneCount} / ${totalCount} done` },
          { label: "Payments", value: `${paidCount} / ${totalPayments} received` },
        ].map((s, i) => (
          <div key={i} className="card" style={{ padding: "18px 20px" }}>
            <p style={{ fontSize: 11, fontWeight: 500, letterSpacing: "0.06em", textTransform: "uppercase", color: "var(--stone)", marginBottom: 6 }}>{s.label}</p>
            <p style={{ fontFamily: "var(--serif)", fontSize: 20, color: "var(--charcoal)" }}>{s.value}</p>
          </div>
        ))}
      </div>

      {/* Next steps */}
      <div className="card">
        <span className="section-label">What happens next</span>
        <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
          {steps.map((step, i) => (
            <div key={i} style={{ display: "flex", gap: 16, paddingBottom: i < steps.length - 1 ? 20 : 0, marginBottom: i < steps.length - 1 ? 20 : 0, borderBottom: i < steps.length - 1 ? "1px solid rgba(0,0,0,0.07)" : "none" }}>
              <div style={{ width: 28, height: 28, borderRadius: "50%", background: "var(--cream-deep)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 12, fontWeight: 500, color: "var(--stone)", marginTop: 1 }}>{i + 1}</div>
              <div>
                <p style={{ fontWeight: 500, fontSize: 14, color: "var(--charcoal)", marginBottom: 3 }}>{step.title}</p>
                <p style={{ fontSize: 13, color: "var(--stone)", lineHeight: 1.55 }}>{step.desc}</p>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Reply time */}
      <div className="card" style={{ background: "var(--cream-deep)", border: "none" }}>
        <p style={{ fontSize: 13, color: "var(--stone)", lineHeight: 1.65 }}>
          <strong style={{ color: "var(--charcoal)", fontWeight: 500 }}>Reply time:</strong>{" "}
          {booking.package === "starter" ? "2 business days" : booking.package === "foundation" ? "1 business day + weekly async update" : "Same-day response (working hours) + weekly async update"}
          {" "}&mdash; Mon&ndash;Fri only. Evenings and weekends are offline.
        </p>
      </div>

      {/* Contact */}
      <div className="card" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
        <div>
          <p style={{ fontWeight: 500, fontSize: 14, color: "var(--charcoal)", marginBottom: 2 }}>Got a question?</p>
          <p style={{ fontSize: 13, color: "var(--stone)" }}>Reply to your confirmation email or reach Chau directly.</p>
        </div>
        <a href="mailto:bachbaochaau@gmail.com" style={{ display: "inline-block", background: "var(--terra)", color: "var(--cream)", fontFamily: "var(--sans)", fontSize: 13, fontWeight: 500, padding: "10px 20px", borderRadius: 8, textDecoration: "none" }}>
          Email Chau
        </a>
      </div>
    </div>
  );
}

// ─── DELIVERABLES ─────────────────────────────────────────────────────────────

function DeliverablesTab({ booking, update }) {
  const items = DELIVERABLES_BY_PKG[booking.package] || [];
  const status = booking.deliverableStatus || {};
  const done = items.filter(d => status[d]).length;

  return (
    <div className="card">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <span className="section-label" style={{ marginBottom: 0 }}>Deliverables</span>
        <span style={{ fontSize: 12, color: "var(--stone)" }}>{done} / {items.length} complete</span>
      </div>
      <div style={{ background: "var(--cream-deep)", borderRadius: 6, height: 4, marginBottom: 24 }}>
        <div style={{ background: "var(--terra)", borderRadius: 6, height: 4, width: `${items.length ? (done / items.length) * 100 : 0}%`, transition: "width 0.4s" }} />
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
        {items.map((item, i) => {
          const checked = !!status[item];
          return (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 0", borderBottom: i < items.length - 1 ? "1px solid rgba(0,0,0,0.07)" : "none" }}>
              <div style={{
                width: 20, height: 20, borderRadius: 4, flexShrink: 0,
                border: checked ? "none" : "1.5px solid rgba(0,0,0,0.2)",
                background: checked ? "var(--terra)" : "transparent",
                display: "flex", alignItems: "center", justifyContent: "center",
              }}>
                {checked && <svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
              </div>
              <span style={{ fontSize: 14, color: checked ? "var(--stone)" : "var(--charcoal)", textDecoration: checked ? "line-through" : "none", flex: 1 }}>{item}</span>
              {checked && <span style={{ fontSize: 11, color: "var(--green)", background: "var(--green-bg)", padding: "2px 8px", borderRadius: 20, fontWeight: 500 }}>Done</span>}
            </div>
          );
        })}
      </div>
      <p style={{ fontSize: 12, color: "var(--stone)", marginTop: 20, fontStyle: "italic" }}>
        Chau marks deliverables complete as they\u2019re handed off to you.
      </p>
    </div>
  );
}

// ─── PAYMENTS ────────────────────────────────────────────────────────────────

function PaymentsTab({ booking }) {
  const schedule = booking.schedule || [];
  const totalPaid = schedule.filter(s => s.paid).reduce((a, s) => a + s.amount, 0);
  const total = schedule.reduce((a, s) => a + s.amount, 0);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div className="card">
        <span className="section-label">Payment schedule</span>
        <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
          {schedule.map((s, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 0", borderBottom: i < schedule.length - 1 ? "1px solid rgba(0,0,0,0.07)" : "none", gap: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{
                  width: 10, height: 10, borderRadius: "50%", flexShrink: 0,
                  background: s.paid ? "var(--green)" : "rgba(0,0,0,0.15)",
                }} />
                <div>
                  <p style={{ fontSize: 14, fontWeight: 500, color: "var(--charcoal)", marginBottom: 2 }}>{s.label}</p>
                  {s.paidOn && <p style={{ fontSize: 12, color: "var(--stone)" }}>Received {new Date(s.paidOn).toLocaleDateString("en-CA", { month: "long", day: "numeric" })}</p>}
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <span style={{ fontFamily: "var(--serif)", fontSize: 20, color: "var(--charcoal)" }}>${s.amount.toLocaleString()}</span>
                <span style={{ fontSize: 12, fontWeight: 500, padding: "3px 10px", borderRadius: 20, background: s.paid ? "var(--green-bg)" : "var(--cream-deep)", color: s.paid ? "var(--green)" : "var(--stone)" }}>
                  {s.paid ? "Received" : "Pending"}
                </span>
              </div>
            </div>
          ))}
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", paddingTop: 20, marginTop: 4, borderTop: "1px solid rgba(0,0,0,0.1)" }}>
          <span style={{ fontSize: 13, color: "var(--stone)" }}>Total paid</span>
          <span style={{ fontFamily: "var(--serif)", fontSize: 22, color: totalPaid === total ? "var(--green)" : "var(--charcoal)" }}>${totalPaid.toLocaleString()} <span style={{ fontSize: 14, color: "var(--stone)" }}>/ ${total.toLocaleString()}</span></span>
        </div>
      </div>

      <div className="card" style={{ background: "var(--cream-deep)", border: "none" }}>
        <p style={{ fontSize: 13, color: "var(--stone)", lineHeight: 1.65 }}>
          <strong style={{ color: "var(--charcoal)", fontWeight: 500 }}>Payment method:</strong>{" "}
          {booking.paymentMethod === "etransfer" ? "E-Transfer to bachbaochaau@gmail.com \u2014 use your name + package as the message." : "PayPal \u2014 we\u2019ll send invoices to your email for each instalment."}
        </p>
      </div>
    </div>
  );
}

// ─── FILES ───────────────────────────────────────────────────────────────────

function FilesTab({ booking, update }) {
  const [dragging, setDragging] = useState(false);
  const inputRef = useRef();

  const addFiles = (fileList) => {
    const newFiles = Array.from(fileList).map(f => ({
      name: f.name, size: f.size, type: f.type,
      uploadedAt: new Date().toISOString(),
    }));
    update({ files: [...(booking.files || []), ...newFiles] });
  };

  const removeFile = (i) => {
    const files = [...(booking.files || [])];
    files.splice(i, 1);
    update({ files });
  };

  return (
    <div className="card">
      <span className="section-label">Files & assets</span>
      <div
        onDragOver={e => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={e => { e.preventDefault(); setDragging(false); addFiles(e.dataTransfer.files); }}
        onClick={() => inputRef.current.click()}
        style={{
          border: `2px dashed ${dragging ? "var(--terra)" : "rgba(0,0,0,0.15)"}`,
          borderRadius: 10, padding: "32px 20px", textAlign: "center",
          cursor: "pointer", transition: "border-color 0.15s, background 0.15s",
          background: dragging ? "rgba(0,0,0,0.03)" : "transparent",
          marginBottom: 20,
        }}>
        <p style={{ fontSize: 14, color: "var(--stone)", marginBottom: 4 }}>Drop files here or <span style={{ color: "var(--terra)", fontWeight: 500 }}>browse</span></p>
        <p style={{ fontSize: 12, color: "var(--stone)" }}>Footage, brand assets, references — anything you want to share with us</p>
        <input ref={inputRef} type="file" multiple onChange={e => addFiles(e.target.files)} />
      </div>

      {(booking.files || []).length === 0 ? (
        <p style={{ fontSize: 13, color: "var(--stone)", textAlign: "center", padding: "12px 0", fontStyle: "italic" }}>No files uploaded yet.</p>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
          {booking.files.map((f, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 0", borderBottom: i < booking.files.length - 1 ? "1px solid rgba(0,0,0,0.07)" : "none", gap: 12 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 18 }}>{f.type.startsWith("video") ? "🎬" : f.type.startsWith("image") ? "🖼" : "📄"}</span>
                <div>
                  <p style={{ fontSize: 14, color: "var(--charcoal)", marginBottom: 1 }}>{f.name}</p>
                  <p style={{ fontSize: 12, color: "var(--stone)" }}>{(f.size / 1024 / 1024).toFixed(1)} MB &middot; {new Date(f.uploadedAt).toLocaleDateString("en-CA", { month: "short", day: "numeric" })}</p>
                </div>
              </div>
              <button onClick={() => removeFile(i)} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--stone)", fontSize: 18, lineHeight: 1 }}>&times;</button>
            </div>
          ))}
        </div>
      )}
      <p style={{ fontSize: 12, color: "var(--stone)", marginTop: 20, fontStyle: "italic" }}>
        Note: files are stored in your browser only in this prototype. We\u2019ll set up a shared Google Drive folder for the real handoff.
      </p>
    </div>
  );
}

// ─── NOTES ───────────────────────────────────────────────────────────────────

function NotesTab({ booking, update }) {
  const [draft, setDraft] = useState("");
  const notes = booking.notes || [];

  const addNote = () => {
    if (!draft.trim()) return;
    const newNote = { text: draft.trim(), createdAt: new Date().toISOString() };
    update({ notes: [...notes, newNote] });
    setDraft("");
  };

  const removeNote = (i) => {
    const n = [...notes];
    n.splice(i, 1);
    update({ notes: n });
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div className="card">
        <span className="section-label">Add a note</span>
        <textarea
          value={draft}
          onChange={e => setDraft(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) addNote(); }}
          placeholder="Questions, ideas, things you want to remember, feedback on drafts\u2026"
          style={{ width: "100%", fontFamily: "var(--sans)", fontSize: 14, padding: "12px 14px", borderRadius: 8, border: "1px solid rgba(0,0,0,0.15)", background: "var(--cream)", color: "var(--charcoal)", outline: "none", resize: "vertical", minHeight: 90, lineHeight: 1.6 }}
        />
        <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 10 }}>
          <button onClick={addNote} disabled={!draft.trim()} style={{ background: "var(--terra)", color: "var(--cream)", border: "none", borderRadius: 8, padding: "9px 20px", fontFamily: "var(--sans)", fontSize: 13, fontWeight: 500, cursor: draft.trim() ? "pointer" : "not-allowed", opacity: draft.trim() ? 1 : 0.45 }}>
            Save note
          </button>
        </div>
      </div>

      {notes.length === 0 ? (
        <p style={{ fontSize: 13, color: "var(--stone)", textAlign: "center", padding: "20px 0", fontStyle: "italic" }}>No notes yet. Add one above.</p>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {[...notes].reverse().map((note, i) => (
            <div key={i} className="card" style={{ padding: "16px 20px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
                <p style={{ fontSize: 14, color: "var(--charcoal)", lineHeight: 1.6, flex: 1, whiteSpace: "pre-wrap" }}>{note.text}</p>
                <button onClick={() => removeNote(notes.length - 1 - i)} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--stone)", fontSize: 16, flexShrink: 0 }}>&times;</button>
              </div>
              <p style={{ fontSize: 11, color: "var(--stone)", marginTop: 8 }}>
                {new Date(note.createdAt).toLocaleDateString("en-CA", { month: "long", day: "numeric", hour: "2-digit", minute: "2-digit" })}
              </p>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
